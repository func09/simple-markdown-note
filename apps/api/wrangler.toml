name = "simple-markdown-note-api"
main = "src/index.ts"
compatibility_date = "2026-03-29"
compatibility_flags = [ "nodejs_compat" ]

[[d1_databases]]
binding = "DB"
database_name = "simple-markdown-note-db"
database_id = "YOUR_DATABASE_ID_HERE"
migrations_dir = "../../packages/database/migrations"

[vars]
NODE_ENV = "production"
# ALLOWED_ORIGIN = "https://your-frontend-domain.pages.dev"
