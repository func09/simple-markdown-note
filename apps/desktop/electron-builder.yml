appId: com.func09.simple-markdown-note
productName: Simple Markdown Note
electronVersion: 33.4.11
directories:
  output: dist_electron
files:
  - dist/**/*
  - from: ../web/dist
    to: renderer
    filter:
      - "!**/*.map"
mac:
  icon: assets/icon.icns
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - arm64
