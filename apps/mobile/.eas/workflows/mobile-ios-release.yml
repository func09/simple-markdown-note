# Expo ダッシュボードの Base directory が /apps/mobile のため、EAS は apps/mobile/.eas/workflows/ を参照する。
# リリースタグは SemVer（v プレフィックス）。IOS_BUILD_NUMBER は App Store 向けに単調増加となる Unix 秒。
# EAS Workflows のタグ glob は「*」ワイルドカードのみ（文字クラス [0-9] 等は使えない）。GitHub Actions とは記法が異なる。
name: Mobile iOS Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

jobs:
  derive_versions:
    name: Derive version and build number
    steps:
      - name: Derive values from tag
        id: derive
        run: |
          TAG="${{ github.ref_name }}"
          case "$TAG" in
            v*) APP_VERSION="${TAG#v}" ;;
            *)
              echo "Tag must start with v (e.g. v1.2.3 or v1.0.0-beta.1)" >&2
              exit 1
              ;;
          esac
          # CFBundleVersion: monotonic integer (Unix epoch seconds)
          BUILD_NUMBER=$(date +%s)
          set-output app_version "$APP_VERSION"
          set-output build_number "$BUILD_NUMBER"
    outputs:
      app_version: ${{ steps.derive.outputs.app_version }}
      build_number: ${{ steps.derive.outputs.build_number }}

  build_ios:
    name: Build iOS production
    needs: [derive_versions]
    type: build
    environment: production
    env:
      EXPO_APP_VERSION: ${{ needs.derive_versions.outputs.app_version }}
      IOS_BUILD_NUMBER: ${{ needs.derive_versions.outputs.build_number }}
    params:
      platform: ios
      profile: production
