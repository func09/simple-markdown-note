name: CI pipeline

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      TURBO_CACHE_DIR: .turbo
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI tasks (db:check, check, check:types, test:cov)
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            pnpm turbo run db:check check check:types test:cov --filter=[${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}]
          else
            pnpm turbo run db:check check check:types test:cov
          fi

      - name: Run JSDoc validations (check:docs)
        run: pnpm check:docs

      - name: Merge PR Coverage Reports
        if: always()
        run: npx tsx .github/scripts/merge-pr-coverage.ts

      - name: Report Monorepo Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('coverage/coverage-summary.json') != ''
        with:
          name: 'Monorepo'
          json-summary-path: 'coverage/coverage-summary.json'
          json-final-path: 'coverage/coverage-final.json'

      - name: Generate Coverage Badges
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g badgen-cli
          npx tsx .github/scripts/generate-badges.ts

      - name: Deploy Badges to gh-pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./.badges
