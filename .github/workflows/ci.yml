name: CI pipeline

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      TURBO_CACHE_DIR: .turbo
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Setup Turbo cache
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('pnpm-lock.yaml', 'turbo.json') }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run CI tasks (db:check, check, check:types, test:cov)
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            pnpm turbo run db:check check check:types test:cov --filter=[${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}]
          else
            pnpm turbo run db:check check check:types test:cov
          fi

      - name: Run JSDoc validations (check:docs)
        run: pnpm check:docs

      - name: Report Web Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('apps/web/coverage/coverage-summary.json') != ''
        with:
          name: 'Web'
          json-summary-path: 'apps/web/coverage/coverage-summary.json'
          json-final-path: 'apps/web/coverage/coverage-final.json'

      - name: Report API Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('apps/api/coverage/coverage-summary.json') != ''
        with:
          name: 'API'
          json-summary-path: 'apps/api/coverage/coverage-summary.json'
          json-final-path: 'apps/api/coverage/coverage-final.json'

      - name: Report Desktop Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('apps/desktop/coverage/coverage-summary.json') != ''
        with:
          name: 'Desktop'
          json-summary-path: 'apps/desktop/coverage/coverage-summary.json'
          json-final-path: 'apps/desktop/coverage/coverage-final.json'

      - name: Report Mobile Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('apps/mobile/coverage/coverage-summary.json') != ''
        with:
          name: 'Mobile'
          json-summary-path: 'apps/mobile/coverage/coverage-summary.json'
          json-final-path: 'apps/mobile/coverage/coverage-final.json'

      - name: Report Schemas Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('packages/schemas/coverage/coverage-summary.json') != ''
        with:
          name: 'Schemas'
          json-summary-path: 'packages/schemas/coverage/coverage-summary.json'
          json-final-path: 'packages/schemas/coverage/coverage-final.json'

      - name: Report Database Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('packages/database/coverage/coverage-summary.json') != ''
        with:
          name: 'Database'
          json-summary-path: 'packages/database/coverage/coverage-summary.json'
          json-final-path: 'packages/database/coverage/coverage-final.json'

      - name: Report API Client Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('packages/api-client/coverage/coverage-summary.json') != ''
        with:
          name: 'API Client'
          json-summary-path: 'packages/api-client/coverage/coverage-summary.json'
          json-final-path: 'packages/api-client/coverage/coverage-final.json'

      - name: Report Emails Coverage
        uses: davelosert/vitest-coverage-report-action@v2
        if: always() && hashFiles('packages/emails/coverage/coverage-summary.json') != ''
        with:
          name: 'Emails'
          json-summary-path: 'packages/emails/coverage/coverage-summary.json'
          json-final-path: 'packages/emails/coverage/coverage-final.json'

