name: CI pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client & OpenAPI types
        run: |
          npm run --workspace=packages/database generate --if-present
          npm run --workspace=packages/openapi generate --if-present

      - name: Verify formatting
        run: npm run format:check --workspaces --if-present

      - name: Setup test database
        run: npm run --workspace=packages/database db:push
        env:
          DATABASE_URL: "file:../../storage/test.db"

      - name: Run tests
        run: npm test
