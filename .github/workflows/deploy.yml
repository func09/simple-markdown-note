name: Deploy

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Inject Secrets into wrangler.toml
        working-directory: apps/api
        run: |
          sed -i 's/database_id = ".*"/database_id = "${{ secrets.D1_DATABASE_ID }}"/' wrangler.toml
          sed -i 's|ALLOWED_ORIGIN=".*"|ALLOWED_ORIGIN="${{ vars.ALLOWED_ORIGIN }}"|' wrangler.toml
          sed -i 's|CLIENT_URL=".*"|CLIENT_URL="${{ vars.CLIENT_URL }}"|' wrangler.toml
          sed -i 's|EMAIL_FROM=".*"|EMAIL_FROM="${{ vars.EMAIL_FROM }}"|' wrangler.toml

      - name: Deploy API Worker
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm wrangler deploy

      - name: Apply D1 migrations
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm db:migrate --remote

      - name: Resolve client version from latest tag
        id: client_version
        shell: bash
        run: |
          TAG="$(git tag --sort=-v:refname | head -n 1)"
          if [ -z "$TAG" ]; then
            VERSION="unknown"
          elif [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}"
          else
            VERSION="$TAG"
          fi
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Deploy Web App
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          VITE_API_URL: ${{ vars.VITE_API_URL }}
          VITE_CLIENT_VERSION: ${{ steps.client_version.outputs.value }}
          VITE_CLIENT_ENVIRONMENT: production
        run: |
          pnpm build
          pnpm wrangler pages deploy dist --project-name simple-markdown-note-web
