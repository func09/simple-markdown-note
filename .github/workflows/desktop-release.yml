name: Desktop Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
      - 'v[0-9]*.[0-9]*.[0-9]*-*'

permissions:
  contents: write # リリースの作成と成果物のアップロードに必要

jobs:
  build-and-release:
    runs-on: macos-latest # macOS/arm64 ビルドのために Mac ランナーを使用

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse SemVer from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$TAG" in
            v*) APP_VERSION="${TAG#v}" ;;
            *)
              echo "Tag must start with v (e.g. v1.2.3 or v1.0.0-beta.1)" >&2
              exit 1
              ;;
          esac
          echo "version=$APP_VERSION" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Web App and Desktop App
        env:
          VITE_ELECTRON: true
          VITE_APP_VERSION: ${{ steps.ver.outputs.version }}
          # Secrets から API URL を取得
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          # 署名をスキップ
          CSC_SKIP_SIGNING: true
        working-directory: apps/desktop
        run: |
          # Webアプリのビルド (VITE_APP_VERSIONを環境変数から引き継ぐ)
          pnpm -F web build

          # Desktop Mainプロセスのビルド
          pnpm run build

          # Electron Builderによるパッケージング（v を除いた SemVer をバージョンに）
          pnpm exec electron-builder build --mac --arm64 -c.extraMetadata.version=${{ steps.ver.outputs.version }}

      - name: Debug Information
        run: |
          echo "GITHUB_REF: ${{ github.ref }}"
          echo "GITHUB_REF_NAME: ${{ github.ref_name }}"
          echo "GITHUB_SHA: ${{ github.sha }}"
          echo "APP_VERSION: ${{ steps.ver.outputs.version }}"

      - name: Create Release and Upload Artifact
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            apps/desktop/dist_electron/*.dmg
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
