name: Mobile EAS iOS Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - "20[0-9][0-9].[0-1][0-9].[0-3][0-9].[0-9]*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eas-ios-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Validate required environment variables
        shell: bash
        run: |
          for key in EXPO_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required value: $key"
              exit 1
            fi
          done

      - name: Pull EAS environment variables (production)
        shell: bash
        run: eas env:pull production --non-interactive --path .env.eas

      - name: Export EAS env file to GITHUB_ENV
        shell: bash
        run: |
          while IFS= read -r line; do
            if [ -z "$line" ] || [[ "$line" =~ ^[[:space:]]*# ]]; then
              continue
            fi
            echo "$line" >> "$GITHUB_ENV"
          done < .env.eas

      - name: Validate required environment variables
        shell: bash
        run: |
          for key in EXPO_PUBLIC_EAS_PROJECT_ID IOS_BUNDLE_IDENTIFIER APPLE_TEAM_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required value in EAS env: $key"
              exit 1
            fi
          done

      - name: Derive app version and iOS build number from tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          IFS='.' read -r year month day seq <<< "$tag"
          expo_app_version="${year}.${month}.${day}"
          ios_build_number="${year}${month}${day}$(printf '%02d' "$seq")"

          {
            echo "EXPO_APP_VERSION=$expo_app_version"
            echo "IOS_BUILD_NUMBER=$ios_build_number"
          } >> "$GITHUB_ENV"

      - name: Start iOS production build on EAS
        shell: bash
        run: |
          set +e
          build_json="$(eas build --platform ios --profile production --non-interactive --no-wait --json 2>&1)"
          build_exit_code=$?
          set -e
          if [ "$build_exit_code" -ne 0 ]; then
            echo "$build_json"
            exit "$build_exit_code"
          fi
          echo "$build_json"
          build_url="$(node -e "const raw=process.argv[1]; const data=JSON.parse(raw); const first=Array.isArray(data)?data[0]:data; console.log(first?.artifacts?.buildUrl || first?.buildDetailsPageUrl || '');" "$build_json")"
          if [ -n "$build_url" ]; then
            echo "EAS build URL: $build_url"
            echo "build_url=$build_url" >> "$GITHUB_OUTPUT"
          fi
