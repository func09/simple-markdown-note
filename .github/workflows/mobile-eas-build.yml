name: Mobile EAS iOS Build

on:
  push:
    tags:
      - "20[0-9][0-9].[0-1][0-9].[0-3][0-9].[0-9]*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  eas-ios-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Validate required environment variables
        shell: bash
        run: |
          for key in EXPO_TOKEN; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required value: $key"
              exit 1
            fi
          done

      - name: Pull EAS environment variables (production)
        shell: bash
        run: pnpm exec eas env:pull production --non-interactive --path .env.eas

      - name: Export required vars from EAS env file
        shell: bash
        run: |
          set -a
          source .env.eas
          set +a
          for key in EXPO_PUBLIC_EAS_PROJECT_ID IOS_BUNDLE_IDENTIFIER APPLE_TEAM_ID; do
            if [ -z "${!key}" ]; then
              echo "::error::Missing required value in EAS env: $key"
              exit 1
            fi
          done

      - name: Derive app version and iOS build number from tag
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          IFS='.' read -r year month day seq <<< "$tag"
          expo_app_version="${year}.${month}.${day}"
          ios_build_number="${year}${month}${day}$(printf '%02d' "$seq")"

          {
            echo "EXPO_APP_VERSION=$expo_app_version"
            echo "IOS_BUILD_NUMBER=$ios_build_number"
          } >> .env.eas

          echo "EXPO_APP_VERSION=$expo_app_version"
          echo "IOS_BUILD_NUMBER=$ios_build_number"
          #region agent log
          node -e "fetch('http://127.0.0.1:7572/ingest/d6c62c8a-c47b-47ff-9265-9f79e5250e8e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'abb24f'},body:JSON.stringify({sessionId:'abb24f',runId:(process.env.GITHUB_RUN_ID||'local')+'-'+(process.env.GITHUB_RUN_ATTEMPT||'0'),hypothesisId:'H2',location:'mobile-eas-build.yml:derive-version',message:'derived tag values',data:{refName:process.env.GITHUB_REF_NAME||'',expoAppVersion:process.env.EXPO_APP_VERSION||expo_app_version,iosBuildNumber:process.env.IOS_BUILD_NUMBER||ios_build_number},timestamp:Date.now()})}).catch(()=>{});"
          #endregion

      - name: Start iOS production build on EAS
        shell: bash
        run: |
          set -a
          source .env.eas
          set +a
          #region agent log
          node -e "fetch('http://127.0.0.1:7572/ingest/d6c62c8a-c47b-47ff-9265-9f79e5250e8e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'abb24f'},body:JSON.stringify({sessionId:'abb24f',runId:(process.env.GITHUB_RUN_ID||'local')+'-'+(process.env.GITHUB_RUN_ATTEMPT||'0'),hypothesisId:'H1',location:'mobile-eas-build.yml:start-build',message:'starting eas build with env presence',data:{hasExpoToken:Boolean(process.env.EXPO_TOKEN),hasProjectId:Boolean(process.env.EXPO_PUBLIC_EAS_PROJECT_ID),hasBundleId:Boolean(process.env.IOS_BUNDLE_IDENTIFIER),hasAppleTeamId:Boolean(process.env.APPLE_TEAM_ID),hasExpoAppVersion:Boolean(process.env.EXPO_APP_VERSION),hasIosBuildNumber:Boolean(process.env.IOS_BUILD_NUMBER)},timestamp:Date.now()})}).catch(()=>{});"
          #endregion
          set +e
          build_json="$(pnpm exec eas build --platform ios --profile production --non-interactive --no-wait --json 2>&1)"
          build_exit_code=$?
          set -e
          #region agent log
          node -e "fetch('http://127.0.0.1:7572/ingest/d6c62c8a-c47b-47ff-9265-9f79e5250e8e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'abb24f'},body:JSON.stringify({sessionId:'abb24f',runId:(process.env.GITHUB_RUN_ID||'local')+'-'+(process.env.GITHUB_RUN_ATTEMPT||'0'),hypothesisId:'H1',location:'mobile-eas-build.yml:eas-result',message:'eas build command result',data:{exitCode:Number(process.argv[1]||'1'),hasCredentialError:/Credentials are not set up|Failed to set up credentials|Distribution Certificate is not validated/i.test(process.argv[2]||''),outputSnippet:String(process.argv[2]||'').slice(-1200)},timestamp:Date.now()})}).catch(()=>{});" "$build_exit_code" "$build_json"
          #endregion
          if [ "$build_exit_code" -ne 0 ]; then
            echo "$build_json"
            exit "$build_exit_code"
          fi
          echo "$build_json"
          build_url="$(node -e "const raw=process.argv[1]; const data=JSON.parse(raw); const first=Array.isArray(data)?data[0]:data; console.log(first?.artifacts?.buildUrl || first?.buildDetailsPageUrl || '');" "$build_json")"
          if [ -n "$build_url" ]; then
            echo "EAS build URL: $build_url"
            echo "build_url=$build_url" >> "$GITHUB_OUTPUT"
            #region agent log
            node -e "fetch('http://127.0.0.1:7572/ingest/d6c62c8a-c47b-47ff-9265-9f79e5250e8e',{method:'POST',headers:{'Content-Type':'application/json','X-Debug-Session-Id':'abb24f'},body:JSON.stringify({sessionId:'abb24f',runId:(process.env.GITHUB_RUN_ID||'local')+'-'+(process.env.GITHUB_RUN_ATTEMPT||'0'),hypothesisId:'H4',location:'mobile-eas-build.yml:build-url',message:'build created successfully',data:{hasBuildUrl:Boolean(process.argv[1])},timestamp:Date.now()})}).catch(()=>{});" "$build_url"
            #endregion
          fi
